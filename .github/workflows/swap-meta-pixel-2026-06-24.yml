name: Swap Meta website pixel

on:
  push:
    paths:
      - .github/workflows/swap-meta-pixel-2026-06-24.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  swap-pixel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Replace app ID with website pixel ID
        run: |
          set -euo pipefail
          OLD_ID="1709029086421401"
          NEW_ID="897444143385193"
          perl -0pi -e "s/${OLD_ID}/${NEW_ID}/g" index.html quick-check.html book.html
          rm -f .github/workflows/swap-meta-pixel-2026-06-24.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html quick-check.html book.html .github/workflows/swap-meta-pixel-2026-06-24.yml
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Use Meta website pixel ID"
          git push
