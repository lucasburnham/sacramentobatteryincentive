<style>
:root{--ink:#102033;--muted:#56687a;--line:#d9e5e6;--teal:#0f766e;--gold:#f5b841;--paper:#fff;--wash:#f6fbfa;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
*{box-sizing:border-box}
body{margin:0;min-height:100vh;display:grid;place-items:center;background:var(--wash);color:var(--ink);line-height:1.5;padding:24px}
.card{width:min(560px,100%);background:#fff;border:1px solid var(--line);border-radius:8px;padding:32px;box-shadow:0 18px 46px rgba(16,32,51,.12)}
.eyebrow{display:inline-flex;padding:7px 12px;border-radius:999px;background:rgba(15,118,110,.11);color:#0a5f59;font-weight:900;font-size:.88rem}
h1{margin:18px 0 10px;font-size:2.4rem;line-height:1.08}
p{color:var(--muted);margin:0 0 22px}
.btn{display:inline-flex;align-items:center;justify-content:center;min-height:48px;padding:13px 20px;border-radius:999px;background:var(--teal);color:#fff;font-weight:900;text-decoration:none}
.note{font-size:.9rem;margin-top:16px}
</style>

<body>
<noscript data-sbi-meta-pixel><img height="1" width="1" style="display:none" alt="" src="https://www.facebook.com/tr?id=897444143385193&ev=PageView&noscript=1"></noscript>
<main class="card">
  <span class="eyebrow">Free visit</span>
  <h1>Opening the calendar.</h1>
  <p>Choose a time for your free Axia by Qcells solar and battery review.</p>
  <a class="btn" id="calendarLink" href="https://calendar.app.google/oNAhhCBMu13PSRtc7" rel="noopener">Open calendar</a>
  <p class="note">Axia by Qcells is not SMUD. Incentives are subject to SMUD rules and availability.</p>
</main>
<script>
var params=new URLSearchParams(location.search);
var source=params.get("source")||"booking_handoff";
var variant=(params.get("message")||params.get("utm_content")||"default").replace(/[^a-zA-Z0-9_]+/g,"_").slice(0,48)||"default";
var calendarUrl="https://calendar.app.google/oNAhhCBMu13PSRtc7";
document.getElementById("calendarLink").href=calendarUrl;
function fireScheduleEvent(){
  if(!window.fbq || window.sbiMetaPixelId==="META_PIXEL_ID") return;
  fbq("track","Schedule",{
    content_category:"SMUD battery booking",
    content_name:"Calendar booking handoff",
    source:source,
    variant:variant
  },{eventID:window.sbiMetaEventId("meta_schedule_"+variant+"_"+source.replace(/[^a-zA-Z0-9_]+/g,"_").slice(0,48))});
}
fireScheduleEvent();
if(params.get("test_no_redirect")!=="1"){
  setTimeout(function(){location.href=calendarUrl},1200);
}
</script>
</body>
